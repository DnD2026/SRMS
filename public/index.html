<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f6f9; color: #333; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #2c3e50; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 20px; font-size: 1.2rem; color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
        input:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #27ae60; }
        button.btn-cancel { background: #95a5a6; margin-top: 10px; }
        button.btn-cancel:hover { background: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; font-size: 0.95rem; }
        th { background: #f8f9fa; color: #2c3e50; font-weight: 600; }
        tr:hover { background: #fdfdfd; }
        .actions { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 10px; font-size: 0.85rem; border-radius: 3px; width: auto; font-weight: normal; }
        .btn-edit { background: #3498db; }
        .btn-edit:hover { background: #2980b9; }
        .btn-delete { background: #e74c3c; }
        .btn-delete:hover { background: #c0392b; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; font-size: 0.9rem; display: none; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Student Record Management System</h1>
    
    <div class="grid">
        <div class="card">
            <h2 id="form-title">Add New Student</h2>
            <div id="alert" class="alert"></div>
            <form id="student-form">
                <input type="hidden" id="student-id">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="first-name" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" id="last-name" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age">
                </div>
                <div class="form-group">
                    <label>Course / Program</label>
                    <input type="text" id="course">
                </div>
                <button type="submit" id="btn-submit">Save Student</button>
                <button type="button" id="btn-cancel" class="btn-cancel" style="display: none;">Cancel Edit</button>
            </form>
        </div>

        <div class="card" style="overflow-x: auto;">
            <h2>Enrolled Students</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #7f8c8d;">Loading database records...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/students';
    const form = document.getElementById('student-form');
    const tableBody = document.getElementById('student-table-body');
    const alertDiv = document.getElementById('alert');
    
    // Load data from Express API
    async function fetchStudents() {
        try {
            const res = await fetch(API_URL);
            const result = await res.json();
            if (result.success) {
                renderTable(result.data);
            } else {
                showMsg(result.message, true);
            }
        } catch (err) {
            showMsg('Could not connect to backend API server.', true);
        }
    }

    function renderTable(students) {
        if (students.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #7f8c8d;">No student records found.</td></tr>`;
            return;
        }
        tableBody.innerHTML = students.map(s => `
            <tr>
                <td><strong>${s.first_name} ${s.last_name}</strong></td>
                <td>${s.email}</td>
                <td>${s.age || 'N/A'}</td>
                <td>${s.course || 'N/A'}</td>
                <td class="actions">
                    <button class="btn-sm btn-edit" onclick="editStudent(${s.id}, '${s.first_name}', '${s.last_name}', '${s.email}', ${s.age || 'null'}, '${s.course || ''}')">Edit</button>
                    <button class="btn-sm btn-delete" onclick="deleteStudent(${s.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('student-id').value;
        const payload = {
            firstName: document.getElementById('first-name').value,
            lastName: document.getElementById('last-name').value,
            email: document.getElementById('email').value,
            age: parseInt(document.getElementById('age').value) || null,
            course: document.getElementById('course').value
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.success) {
                showMsg(result.message, false);
                resetForm();
                fetchStudents();
            } else {
                showMsg(result.message, true);
            }
        } catch (err) {
            showMsg('Error sending transaction to server.', true);
        }
    });

    async function deleteStudent(id) {
        if (!confirm('Are you sure you want to remove this record?')) return;
        try {
            const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            const result = await res.json();
            if (result.success) {
                showMsg(result.message, false);
                fetchStudents();
                if(document.getElementById('student-id').value === String(id)) resetForm();
            } else {
                showMsg(result.message, true);
            }
        } catch (err) {
            showMsg('Failed to process delete execution.', true);
        }
    }

    function editStudent(id, firstName, lastName, email, age, course) {
        document.getElementById('form-title').innerText = 'Modify Student Record';
        document.getElementById('student-id').value = id;
        document.getElementById('first-name').value = firstName;
        document.getElementById('last-name').value = lastName;
        document.getElementById('email').value = email;
        document.getElementById('age').value = age !== null ? age : '';
        document.getElementById('course').value = course;
        document.getElementById('btn-cancel').style.display = 'block';
        document.getElementById('btn-submit').innerText = 'Update Changes';
    }

    document.getElementById('btn-cancel').addEventListener('click', resetForm);

    function resetForm() {
        document.getElementById('form-title').innerText = 'Add New Student';
        form.reset();
        document.getElementById('student-id').value = '';
        document.getElementById('btn-cancel').style.display = 'none';
        document.getElementById('btn-submit').innerText = 'Save Student';
    }

    function showMsg(msg, isError) {
        alertDiv.innerText = msg;
        alertDiv.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
        alertDiv.style.display = 'block';
        setTimeout(() => { alertDiv.style.display = 'none'; }, 4000);
    }

    // Initial Database Pull on load
    fetchStudents();
</script>
</body>
</html>
